name: Verificar Proyecto

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Verificar index.html
        run: test -f index.html

      - name: Verificar css/style.css
        run: test -f css/style.css

      - name: Verificar js/script.js
        run: test -f js/script.js

      - name: Verificar README.md
        run: test -f README.md