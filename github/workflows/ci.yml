name: Verificar Proyecto

on:
  push:
    branches:
      - main

pull_request:
 branches:
  - main

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - name: colonar repositorio
      - uses: actions/checkout@v4

      - name: Verificar frontend/index.html
      - run: test -f frontend/index.html

      - name: Verificar frontend/style.css
      - run: test -f frontend/style.css

      - name: Verificar README.md
      - run: test -f README.md
      
        